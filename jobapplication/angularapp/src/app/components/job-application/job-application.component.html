<div class="job-application">
    <h2>Job Applications</h2>
  
    <!-- Form for adding a new application -->
    <div>
      <h3>Add New Application</h3>
      <form (ngSubmit)="addApplication()">
  
        <label for="yearsOfExperience">Years of Experience:</label>
        <input
          type="number"
          id="yearsOfExperience"
          [(ngModel)]="newApplication.yearsOfExperience"
          name="yearsOfExperience"
          required
        />
  
        <label for="skills">Skills:</label>
        <input
          type="text"
          id="skills"
          [(ngModel)]="newApplication.skills"
          name="skills"
          required
        />
  
        <label for="locationPreference">Location Preference:</label>
        <input
          type="text"
          id="locationPreference"
          [(ngModel)]="newApplication.locationPreference"
          name="locationPreference"
          required
        />
  
        <button type="submit">Add Application</button>
      </form>
      <!-- In job-application.component.html -->
<div *ngIf="errorMessage" class="error-message">
    {{ errorMessage }}
  </div>
  
    </div>
