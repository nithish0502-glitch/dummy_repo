<div class="login-container">
  <div class="login-image">
    <img
      src="https://c8.alamy.com/comp/2PA07J4/job-apply-icon-use-in-mobile-and-app-development-or-commercial-purposes-or-any-type-of-design-projects-2PA07J4.jpg"
      alt="Job Apply Icon"
    />
  </div>
  <div class="login-form-container">
    <h2 class="login-title">Login</h2>
    <form #loginForm="ngForm" (ngSubmit)="login()" class="login-form" novalidate>
      <!-- Email -->
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="email"
          #emailField="ngModel"
          required
          placeholder="Enter your email"
          class="form-control"
        />
        <div *ngIf="emailField.touched && emailField.invalid" class="error-message">
          <div *ngIf="emailField.errors?.required">Email is required.</div>
          <div *ngIf="emailField.errors?.email">Enter a valid email address.</div>
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="password"
          #passwordField="ngModel"
          required
          minlength="6"
          placeholder="Enter your password"
          class="form-control"
        />
        <div *ngIf="passwordField.touched && passwordField.invalid" class="error-message">
          <div *ngIf="passwordField.errors?.required">Password is required.</div>
          <div *ngIf="passwordField.errors?.minlength">Password must be at least 6 characters long.</div>
        </div>
      </div>

      <!-- Error Messages -->
      <div *ngIf="error" class="error-message">{{ error }}</div>

      <!-- Submit Button -->
      <button
        type="submit"
        class="login-btn"
        [disabled]="loginForm.invalid"
      >
        Login
      </button>
    </form>

    <!-- Register Link -->
    <div class="register-link">
      <p>Don't have an account? <a routerLink="/signup">Create Account</a></p>
    </div>
  </div>
</div>
