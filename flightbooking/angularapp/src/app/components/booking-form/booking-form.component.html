<div class="booking-form-container">
    <h2>Book Your Flight</h2>
  
    <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>
    <div *ngIf="successMessage" class="success-message">{{ successMessage }}</div>
  
    <form (ngSubmit)="bookFlight()">
      <div class="form-group">
        <label for="flight">Select Flight:</label>
        <select id="flight" [(ngModel)]="selectedFlightId" name="flight" required>
          <option value="" disabled>Select a flight</option>
          <option *ngFor="let flight of flights" [value]="flight.flightId">
            {{ flight.flightNumber }} - {{ flight.airline }}
          </option>
        </select>
      </div>
  
      <div class="form-group">
        <label for="passengers">Number of Passengers:</label>
        <input type="number" id="passengers" [(ngModel)]="numberOfPassengers" name="passengers" min="1" required>
      </div>
  
      <button type="submit" class="book">Confirm Booking</button>
      <button type="button" (click)="resetForm()" class="reset">Reset</button>
    </form>
  </div>
