<div class="manage-booking-container">
    <h1>Manage Bookings</h1>
  
    <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>
  
    <table *ngIf="bookings.length > 0">
      <thead>
        <tr>
          <th>Flight Number</th>
          <th>User Name</th>
          <th>User Email</th>
          <th>Booking Date</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let booking of bookings">
          <td>{{ booking.flight.flightNumber }}</td>
          <td>{{ booking.user.username }}</td>
          <td>{{ booking.user.email }}</td>
          <td>{{ booking.bookingDate | date:'short' }}</td>
          <td>{{ booking.status }}</td>
          <td>
            <button (click)="updateBookingStatus(booking.id, 'Approved')">Approve</button>
            <button (click)="updateBookingStatus(booking.id, 'Rejected')">Reject</button>
          </td>
        </tr>
      </tbody>
    </table>
  
    <div *ngIf="bookings.length === 0" class="no-bookings-message">
      No bookings available.
    </div>
  </div>
